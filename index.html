<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorateur des Stratégies IA en Afrique</title>
    <!-- Tailwind CSS pour un design moderne et responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js pour le graphique interactif -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Comparatif des Stratégies Nationales IA</h2>
        <p class="text-sm text-gray-500 mb-6">Mise à jour dynamique via Google Sheets</p>

        <!-- Filtres par Piliers -->
        <div class="mb-6">
            <span class="block text-sm font-medium text-gray-700 mb-2">Sélectionner un Pilier Stratégique :</span>
            <div id="filter-container" class="flex flex-wrap gap-2">
                <!-- Les boutons de filtres seront injectés ici par JavaScript -->
            </div>
        </div>

        <!-- Zone d'affichage : Graphique + Détails -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
            <!-- Emplacement du graphique -->
            <div class="relative h-64 md:h-80">
                <canvas id="aiChart"></canvas>
            </div>

            <!-- Emplacement des descriptions textuelles dynamiques -->
            <div id="details-container" class="space-y-4 max-h-80 overflow-y-auto pr-2">
                <p class="text-gray-400 italic">Sélectionnez un pilier pour afficher les détails par pays.</p>
            </div>
        </div>
    </div>

    <script>
        // URL DE VOTRE GOOGLE SHEETS (À remplacer par votre lien d'export CSV)
        const GOOGLE_SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRUUItLUj_0oHiiNDvyO6nvYJkchBWwI7A1hQJqyAY6iij7utnsi_QGpIHy45jFcD_5apGqm_v7i7qu/pub?output=csv';

        let rawData = [];
        let chartInstance = null;
        let currentPilier = '';

        // 1. Fonction simple pour parser le CSV sans bibliothèque externe
        function parseCSV(text) {
            const lines = text.split('\n').map(line => line.trim()).filter(line => line);
            const headers = lines[0].split(',').map(h => h.trim());
            
            return lines.slice(1).map(line => {
                // Gestion basique des virgules dans les descriptions entourées de guillemets
                const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(',');
                const row = matches.map(val => val.replace(/^"|"$/g, '').trim());
                return {
                    pays: row[0],
                    pilier: row[1],
                    score: parseFloat(row[2]) || 0,
                    description: row[3] || ''
                };
            });
        }

        // 2. Initialisation et récupération des données
        async function initData() {
            try {
                const response = await fetch(GOOGLE_SHEETS_CSV_URL);
                const csvText = await response.text();
                rawData = parseCSV(csvText);

                // Extraire la liste unique des piliers pour générer les boutons
                const piliers = [...new Set(rawData.map(item => item.pilier))];
                renderFilterButtons(piliers);

                // Sélectionner le premier pilier par défaut
                if (piliers.length > 0) {
                    updateDashboard(piliers[0]);
                }
            } catch (error) {
                console.error("Erreur lors de la récupération des données :", error);
                document.getElementById('details-container').innerHTML = `<p class="text-red-500">Erreur de chargement des données Google Sheets.</p>`;
            }
        }

        // 3. Génération dynamique des boutons de filtres
        function renderFilterButtons(piliers) {
            const container = document.getElementById('filter-container');
            container.innerHTML = '';
            piliers.forEach(pilier => {
                const btn = document.createElement('button');
                btn.innerText = pilier;
                btn.className = `px-4 py-2 text-sm font-medium rounded-lg border transition-all duration-200 btn-filter bg-white text-gray-700 border-gray-300 hover:bg-gray-50`;
                btn.onclick = () => updateDashboard(pilier);
                btn.setAttribute('data-pilier', pilier);
                container.appendChild(btn);
            });
        }

        // 4. Mise à jour combinée du graphique et des descriptions
        function updateDashboard(selectedPilier) {
            currentPilier = selectedPilier;
            
            // Gestion visuelle de l'état actif des boutons
            document.querySelectorAll('.btn-filter').forEach(btn => {
                if (btn.getAttribute('data-pilier') === selectedPilier) {
                    btn.className = "px-4 py-2 text-sm font-medium rounded-lg border bg-blue-600 text-white border-blue-600 btn-filter shadow-sm";
                } else {
                    btn.className = "px-4 py-2 text-sm font-medium rounded-lg border bg-white text-gray-700 border-gray-300 hover:bg-gray-50 btn-filter";
                }
            });

            // Filtrer les données pour le pilier choisi
            const filtered = rawData.filter(d => d.pilier === selectedPilier);
            const labels = filtered.map(d => d.pays);
            const scores = filtered.map(d => d.score);

            // Mettre à jour ou créer le graphique Chart.js
            const ctx = document.getElementById('aiChart').getContext('2d');
            if (chartInstance) { chartInstance.destroy(); }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Intensité / Priorité (%)',
                        data: scores,
                        backgroundColor: 'rgba(37, 99, 235, 0.2)',
                        borderColor: 'rgba(37, 99, 235, 1)',
                        borderWidth: 2,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 100 } },
                    plugins: { legend: { display: false } }
                }
            });

            // Mettre à jour la section de description textuelle
            const detailsContainer = document.getElementById('details-container');
            detailsContainer.innerHTML = '';
            filtered.forEach(d => {
                const card = document.createElement('div');
                card.className = "p-3 bg-gray-50 border-l-4 border-blue-500 rounded-r-lg shadow-sm";
                card.innerHTML = `<h4 class="font-bold text-gray-900">${d.pays}</h4><p class="text-sm text-gray-600 mt-1">${d.description}</p>`;
                detailsContainer.appendChild(card);
            });
        }

        // Lancement au chargement de la page
        window.onload = initData;
    </script>
</body>
</html>
